<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deva 101 - VIP Okey</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="welcome-screen" class="screen">
        <div class="auth-box">
            <h1 class="logo">DEVA <span>101</span></h1>
            <p class="subtitle">VIP ONLINE OKEY ELITE</p>
            <button id="btn-start-fullscreen" class="btn btn-gold pulse">VIP OYUNA BAŞLA</button>
        </div>
    </div>

    <div id="auth-container" class="screen hidden">
        <div class="auth-box">
            <h1 class="logo">DEVA <span>101</span></h1>
            <p class="subtitle">VIP ONLINE OKEY ELITE</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Kullanıcı Adı" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Şifre" required>
            </div>
            
            <button id="btn-login" class="btn btn-gold">GİRİŞ YAP</button>
            <button id="btn-register" class="btn btn-outline">ÜCRETSİZ KAYIT OL</button>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <div id="game-container" class="screen hidden">
        <header class="game-header">
            <div class="user-info">Hoş Geldiniz, <span id="display-name" class="gold-text">...</span></div>
            <h2 class="table-title">DEVA 101 - VIP MASA</h2>
            <button id="btn-logout" class="btn-sm">Çıkış</button>
        </header>

        <div class="lobby-panel" id="lobby-panel">
            <button id="btn-find-match" class="btn btn-gold">HIZLI MASAYA OTUR (ONLINE)</button>
            <p id="lobby-status" class="gold-text"></p>
        </div>

        <div class="okey-table hidden" id="okey-table">
            <div class="player player-top">Rakip 2 (Bekleniyor...)</div>
            <div class="player player-left">Rakip 1 (Bekleniyor...)</div>
            <div class="player player-right">Rakip 3 (Bekleniyor...)</div>
            
            <div class="table-center">
                <div class="deck">Taş Çek</div>
                <div id="discard-pile" class="discard">Atılan Taş</div>
            </div>

            <div class="player-me">
                <div class="istaka" id="my-istaka"></div>
                <div class="player-info-tag">SİZ</div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
