<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>101 Okey Pro</title>
    <style>
        body { margin: 0; background: #07330a; font-family: sans-serif; color: white; overflow: hidden; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Tam Ekran Butonu Başlangıçta Görünür */
        #fullscreen-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; }

        /* Masa Alanı */
        .table-area { flex: 1; display: grid; grid-template-columns: 120px 1fr 120px; grid-template-rows: 60px 1fr; position: relative; }
        .bot { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; text-align: center; border: 2px solid #444; height: fit-content; align-self: center; }
        .active-turn { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }

        .center-board { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .open-area { width: 80%; height: 120px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #aaa; }

        /* Çift Sıra Istaka */
        .player-rack { background: #3d230d; height: 180px; padding: 10px; border-top: 6px solid #291809; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .rack-row { display: flex; gap: 4px; height: 75px; width: 95%; justify-content: center; }
        
        .tile { width: 42px; height: 68px; background: #fdf5e6; color: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 2px 2px 4px #000; cursor: pointer; border-bottom: 3px solid #ccc; position: relative; }
        .tile.red { color: #d63031; } .tile.blue { color: #0984e3; } .tile.black { color: #2d3436; } .tile.yellow { color: #f39c12; }
        .tile.selected { transform: translateY(-10px); border-color: #f1c40f; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 5px; }
        button { padding: 6px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-sort { background: #27ae60; color: white; }
        .btn-open { background: #2980b9; color: white; }
    </style>
</head>
<body>

<div id="fullscreen-overlay">
    <button onclick="startFullscreen()" style="padding: 20px 40px; font-size: 20px; background: #e67e22; color: white; border-radius: 10px;">OYUNU BAŞLAT (TAM EKRAN)</button>
</div>

<div id="game-container">
    <div style="grid-column: span 3; text-align: center; padding-top: 10px;" class="bot" id="bot2">İpek (Karşı)</div>
    <div class="table-area">
        <div class="bot" id="bot1" style="margin-left: 10px;">Seda (Sol)</div>
        <div class="center-board">
            <div id="turn-msg" style="color: #f1c40f; font-weight: bold;">Senin Sıran!</div>
            <div class="open-area" id="table-open-area">Buraya Seri Açılacak</div>
            <div style="display: flex; gap: 40px;">
                <div id="draw-btn" style="width: 60px; height: 85px; background: #fff; color: #000; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 4px 4px 0 #222; cursor: pointer;">DESTE</div>
                <div id="discard-area" style="width: 60px; height: 85px; border: 2px dashed #fff; border-radius: 5px;"></div>
            </div>
        </div>
        <div class="bot" id="bot3" style="margin-right: 10px;">Rümeysa (Sağ)</div>
    </div>

    <div class="player-rack">
        <div class="btn-group">
            <button class="btn-sort" onclick="sortTiles()">SIRALA</button>
            <button class="btn-open" onclick="openSeries()">EL AÇ (101)</button>
        </div>
        <div class="rack-row" id="row-1"></div>
        <div class="rack-row" id="row-2"></div>
    </div>
</div>

<script>
    let myTiles = [];
    let turn = 0;
    const colors = ['red', 'blue', 'black', 'yellow'];

    function startFullscreen() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        document.getElementById('fullscreen-overlay').style.display = 'none';
        initGame();
    }

    function initGame() {
        let deck = [];
        for(let i=0; i<2; i++) {
            colors.forEach(c => {
                for(let n=1; n<=13; n++) deck.push({color: c, num: n});
            });
        }
        deck.sort(() => Math.random() - 0.5);
        myTiles = deck.splice(0, 21);
        renderRack();
    }

    function renderRack() {
        const row1 = document.getElementById('row-1');
        const row2 = document.getElementById('row-2');
        row1.innerHTML = ''; row2.innerHTML = '';

        myTiles.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `tile ${t.color}`;
            div.innerText = t.num;
            div.onclick = () => discard(i);
            
            if(i < 11) row1.appendChild(div);
            else row2.appendChild(div);
        });
    }

    function discard(index) {
        if(turn !== 0) return;
        const tile = myTiles.splice(index, 1)[0];
        document.getElementById('discard-area').innerHTML = `<div class="tile ${tile.color}">${tile.num}</div>`;
        renderRack();
        turn = 1;
        updateUI();
        setTimeout(botLoop, 1500);
    }

    function botLoop() {
        if(turn === 0) return;
        document.querySelectorAll('.bot').forEach(b => b.classList.remove('active-turn'));
        document.getElementById(`bot${turn}`).classList.add('active-turn');
        
        setTimeout(() => {
            turn = (turn + 1) % 4;
            if(turn === 0) {
                document.querySelectorAll('.bot').forEach(b => b.classList.remove('active-turn'));
                updateUI();
            } else {
                botLoop();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('turn-msg').innerText = turn === 0 ? "Senin Sıran!" : "Rakipler Oynuyor...";
    }

    function sortTiles() {
        myTiles.sort((a, b) => a.num - b.num);
        renderRack();
    }

    function openSeries() {
        alert("Henüz perleriniz 101 sayısına ulaşmadı!");
    }

    document.getElementById('draw-btn').onclick = () => {
        if(turn === 0 && myTiles.length < 22) {
            myTiles.push({color: colors[Math.floor(Math.random()*4)], num: Math.floor(Math.random()*13)+1});
            renderRack();
        }
    };
</script>
</body>
</html>
