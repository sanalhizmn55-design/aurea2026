<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Bounce - Offline Game</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            background: #000;
            cursor: none;
        }
        .stats {
            margin-bottom: 10px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="stats">Skor: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        canvas.width = 600;
        canvas.height = 400;

        let score = 0;
        let gameActive = true;

        // Top özellikleri
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            dx: 4,
            dy: -4,
            color: "#ff007b"
        };

        // Pedal özellikleri
        let paddle = {
            width: 100,
            height: 15,
            x: (canvas.width - 100) / 2,
            color: "#00f2ff"
        };

        // Mouse hareketi
        document.addEventListener("mousemove", (e) => {
            let relativeX = e.clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddle.x = relativeX - paddle.width / 2;
            }
        });

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);
            ctx.fillStyle = paddle.color;
            ctx.fill();
            ctx.closePath();
        }

        function update() {
            if (!gameActive) return;

            // Duvarlardan sekme
            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
                ball.dx = -ball.dx;
            }
            if (ball.y + ball.dy < ball.radius) {
                ball.dy = -ball.dy;
            }

            // Pedala çarpma kontrolü
            if (ball.y + ball.dy > canvas.height - paddle.height - 20) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    ball.dy = -ball.dy;
                    ball.dy *= 1.05; // Her vuruşta hızlanır
                    ball.dx *= 1.05;
                    score++;
                    scoreElement.innerText = score;
                    ball.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                } else if (ball.y + ball.dy > canvas.height) {
                    gameActive = false;
                    alert("OYUN BİTTİ! Skorun: " + score + "\nTekrar oynamak için sayfayı yenile.");
                    document.location.reload();
                }
            }

            ball.x += ball.dx;
            ball.y += ball.dy;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            drawPaddle();
            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
